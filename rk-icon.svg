<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="field" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#12613f"/>
      <stop offset="60%" stop-color="#0c4a30"/>
      <stop offset="100%" stop-color="#062a1b"/>
    </radialGradient>
    <linearGradient id="brass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6e39a"/>
      <stop offset="35%" stop-color="#e8c874"/>
      <stop offset="65%" stop-color="#b48d3c"/>
      <stop offset="100%" stop-color="#7c5f24"/>
    </linearGradient>
    <linearGradient id="gold2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7e7a6"/>
      <stop offset="100%" stop-color="#cba14b"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- rounded tile -->
  <rect width="512" height="512" rx="112" fill="url(#field)"/>
  <rect x="6" y="6" width="500" height="500" rx="107" fill="none" stroke="#caa24b" stroke-opacity="0.35" stroke-width="3"/>

  <!-- wheel ring -->
  <g filter="url(#soft)">
    <circle cx="256" cy="256" r="176" fill="none" stroke="url(#brass)" stroke-width="20"/>
    <circle cx="256" cy="256" r="150" fill="none" stroke="#caa24b" stroke-opacity="0.5" stroke-width="2"/>
  </g>

  <!-- pocket ticks -->
  <g stroke="#e8c874" stroke-opacity="0.55" stroke-width="4" stroke-linecap="round">
    <line x1="256" y1="92"  x2="256" y2="112"/>
    <line x1="256" y1="400" x2="256" y2="420"/>
    <line x1="92"  y1="256" x2="112" y2="256"/>
    <line x1="400" y1="256" x2="420" y2="256"/>
    <line x1="140" y1="140" x2="155" y2="155"/>
    <line x1="372" y1="140" x2="357" y2="155"/>
    <line x1="140" y1="372" x2="155" y2="357"/>
    <line x1="372" y1="372" x2="357" y2="357"/>
  </g>

  <!-- monogram -->
  <text x="256" y="258" font-family="Georgia, 'Cormorant Garamond', serif" font-weight="700"
        font-size="150" fill="url(#gold2)" text-anchor="middle" dominant-baseline="central"
        letter-spacing="2">RK</text>

  <!-- ball -->
  <circle cx="256" cy="104" r="13" fill="#fdfdfb" stroke="#9a9a9a" stroke-width="1.5"/>
</svg>
